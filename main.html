<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Size Chart</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 80%;
            margin: 40px auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        thead {
            background-color: #333;
            color: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #e6f7ff;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Online Shopping Size Chart</h2>

    <table>

        <!-- Header Row -->
        <thead>
            <tr>
                <th>Size</th>
                <th>Chest</th>
                <th>Waist</th>
                <th>Length</th>
            </tr>
        </thead>

        <!-- Data Rows -->
        <tbody>
            <tr>
                <td>S</td>
                <td>36</td>
                <td>30</td>
                <td>26</td>
            </tr>

            <tr>
                <td>M</td>
                <td>38</td>
                <td>32</td>
                <td>27</td>
            </tr>

            <tr>
                <td>L</td>
                <td>40</td>
                <td>34</td>
                <td>28</td>
            </tr>

            <tr>
                <td>XL</td>
                <td>42</td>
                <td>36</td>
                <td>29</td>
            </tr>

            <tr>
                <td>XXL</td>
                <td>44</td>
                <td>38</td>
                <td>30</td>
            </tr>
        </tbody>

    </table>

</div>

</body>
</html>
