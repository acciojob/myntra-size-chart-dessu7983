<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shopping Size Chart</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container{
            width: 700px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        thead{
            background-color: #ff3f6c;
            color: white;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        tbody tr:nth-child(even){
            background-color: #f9f9f9;
        }

        tbody tr:hover{
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Size Chart</h2>

        <table>

            <thead>
                <tr>
                    <th>Size</th>
                    <th>Chest (in)</th>
                    <th>Waist (in)</th>
                    <th>Hip (in)</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>S</td>
                    <td>36</td>
                    <td>30</td>
                    <td>38</td>
                </tr>

                <tr>
                    <td>M</td>
                    <td>38</td>
                    <td>32</td>
                    <td>40</td>
                </tr>

                <tr>
                    <td>L</td>
                    <td>40</td>
                    <td>34</td>
                    <td>42</td>
                </tr>

                <tr>
                    <td>XL</td>
                    <td>42</td>
                    <td>36</td>
                    <td>44</td>
                </tr>

                <tr>
                    <td>XXL</td>
                    <td>44</td>
                    <td>38</td>
                    <td>46</td>
                </tr>
            </tbody>

        </table>
    </div>

</body>
</html>
